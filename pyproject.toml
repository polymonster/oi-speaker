[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "oi-speaker"
version = "0.1.0"
requires-python = ">= 3.11"
dependencies = [
    "openwakeword @ git+https://github.com/dscripka/openWakeWord.git",
    "pyaudio",
    "sounddevice",
    "speexdsp-ns"
]

[project.scripts]
speaker = "speaker:main"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/speaker.py"]